name: CICD

on:
  workflow_dispatch:  
   inputs:
      environment:
        description: this is the env where workflow runs
        default: dev
        required: true
        type: choice
        options:
          - dev
          - stag
          - prod
          
 
    # basically defining this will provide options in the actions tab
   
    #purpose of path is that actions will only run when changes are made to the files with  the specific type. Basically its the filter 
    #paths:
     # - '**.html'
      # - '**.yml'
        
  

jobs:

  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout the code
        run: echo "check out the code"
  build:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: build docker container
        run: echo "build docker container" 
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: test the container
        run: echo "test the container"
  deploy:
    if: inputs.environment == 'dev'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: deploy the container
        run: echo "deploy the container"      
