name: build docker container

on:
    workflow_call:
    
jobs:
    build-and-push:
      runs-on: ubuntu-latest
      steps:
        - name: checkout code
          uses: actions/checkout@v4
        - name: docker build and push
          uses: docker/login-action@v3
          with:
            username: ${{ vars.DOCKERHUB_USER }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        - name: build and push  
          uses: docker/build-push-action@v6
          with:
            push: true
            tags: |
                ${{ vars.DOCKERHUB_USER }}/AI-BANKAPP-DEVOPS:${{ github.sha }} 
                ${{ vars.DOCKERHUB_USER }}/AI-BANKAPP-DEVOPS:latest
        
# updated the dockerhub user and token
